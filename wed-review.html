<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wednesday Final Review — Exit ticket out of COA</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0F172A;
  --bg-card: #1E293B;
  --bg-elevated: #334155;
  --text: #F1F5F9;
  --text-dim: #94A3B8;
  --primary: #6366F1;
  --green: #10B981;
  --green-soft: rgba(16,185,129,0.18);
  --red: #EF4444;
  --red-soft: rgba(239,68,68,0.18);
  --yellow: #FBBF24;
  --orange: #F59E0B;
  --pink: #EC4899;
  --border: #334155;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #F8FAFC; --bg-card: #FFFFFF; --bg-elevated: #F1F5F9;
    --text: #1A1A1A; --text-dim: #64748B; --border: #E2E8F0;
  }
}
html, body {
  margin: 0; padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  font-size: 16px; line-height: 1.5;
}
.container { max-width: 700px; margin: 0 auto; padding: 1rem 1rem 4rem; }

header.top {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.5rem 0 1rem;
}
.logo {
  font-size: 1.2rem; font-weight: 800;
  background: linear-gradient(135deg, #F59E0B, #EF4444);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  text-decoration: none;
}
.score-pill {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 999px; padding: 0.35rem 0.85rem;
  font-size: 0.85rem; font-weight: 700;
}

.hero {
  background: linear-gradient(135deg, #F59E0B, #DC2626);
  border-radius: 18px;
  padding: 1.1rem 1.25rem;
  color: white;
  margin-bottom: 1.5rem;
}
.hero h1 { margin: 0 0 0.3rem; font-size: 1.25rem; font-weight: 800; }
.hero p { margin: 0; font-size: 0.92rem; opacity: 0.92; }
.hero .countdown {
  display: inline-block;
  background: rgba(255,255,255,0.22);
  padding: 0.3rem 0.7rem; border-radius: 999px;
  margin-top: 0.5rem; font-weight: 700; font-size: 0.82rem;
}

.progress-bar {
  height: 8px; background: var(--bg-elevated); border-radius: 8px;
  overflow: hidden; margin-bottom: 0.85rem;
}
.progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--primary), var(--pink));
  transition: width 0.3s ease;
}
.q-meta {
  display: flex; justify-content: space-between;
  font-size: 0.8rem; color: var(--text-dim);
  font-weight: 600; margin-bottom: 0.5rem;
}
.q-meta .topic { color: var(--primary); }

.q-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 16px; padding: 1.1rem 1.2rem;
  margin-bottom: 1.5rem;
}
.q-text {
  font-size: 1.05rem; font-weight: 600;
  line-height: 1.55; margin-bottom: 0.6rem;
}
.q-text sup { font-size: 0.75em; vertical-align: super; }
.q-text sub { font-size: 0.75em; vertical-align: sub; }
.q-extra {
  background: var(--bg-elevated);
  padding: 0.5rem 0.85rem; border-radius: 8px;
  font-family: "SF Mono", Menlo, monospace;
  font-size: 0.92rem;
  margin: 0.5rem 0;
}
.q-graph-note {
  font-style: italic; color: var(--text-dim);
  font-size: 0.88rem;
  margin: 0.3rem 0;
}

.choices { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.85rem; }
.choice {
  background: var(--bg-elevated); border: 2px solid transparent;
  color: var(--text); padding: 0.85rem 1rem; border-radius: 10px;
  font-size: 0.98rem; font-family: inherit; font-weight: 500;
  cursor: pointer; text-align: left;
  transition: all 0.15s; display: flex; align-items: center; gap: 0.7rem;
}
.choice .letter {
  flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
  background: var(--bg-card); display: flex; align-items: center; justify-content: center;
  font-size: 0.82rem; font-weight: 700; color: var(--text-dim);
}
.choice:hover { border-color: var(--primary); }
.choice.selected { border-color: var(--primary); background: rgba(99,102,241,0.12); }
.choice.selected .letter { background: var(--primary); color: white; }
.choice.correct { border-color: var(--green); background: var(--green-soft); }
.choice.correct .letter { background: var(--green); color: white; }
.choice.wrong { border-color: var(--red); background: var(--red-soft); }
.choice.wrong .letter { background: var(--red); color: white; }
.choice:disabled { cursor: not-allowed; }

.feedback {
  margin-top: 1rem;
  padding: 0.8rem 1rem;
  border-radius: 10px;
  font-size: 0.95rem;
  font-weight: 600;
}
.feedback.right { background: var(--green-soft); color: var(--green); border-left: 3px solid var(--green); }
.feedback.wrong { background: var(--red-soft); color: var(--red); border-left: 3px solid var(--red); }
.feedback strong { display: block; margin-bottom: 0.2rem; }

.nav-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
.nav-row .btn { flex: 1; padding: 0.85rem; font-size: 0.95rem; font-weight: 700; }
.btn {
  border: none; border-radius: 10px; cursor: pointer;
  font-family: inherit;
}
.btn-primary {
  background: linear-gradient(135deg, var(--primary), #4F46E5);
  color: white;
}
.btn-primary:hover { transform: translateY(-1px); }
.btn-secondary {
  background: var(--bg-elevated); color: var(--text); border: 1px solid var(--border);
}

/* Results screen */
.results {
  background: var(--bg-card); border-radius: 18px; padding: 1.5rem;
  border: 1px solid var(--border);
}
.results.pass {
  background: linear-gradient(135deg, rgba(16,185,129,0.18), var(--bg-card));
  border-color: var(--green);
}
.results.fail {
  background: linear-gradient(135deg, rgba(245,158,11,0.18), var(--bg-card));
  border-color: var(--orange);
}
.results h2 {
  margin: 0 0 0.5rem; font-size: 1.6rem;
}
.big-score {
  font-size: 4rem; font-weight: 900; line-height: 1; margin: 0.5rem 0;
}
.big-score.pass { color: var(--green); }
.big-score.fail { color: var(--orange); }
.results .verdict { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.8rem; }
.results .summary { color: var(--text-dim); font-size: 0.95rem; line-height: 1.6; }

.miss-list { margin-top: 1.5rem; }
.miss-list h3 { font-size: 0.85rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
.miss-item {
  background: var(--bg-card); border-left: 3px solid var(--red);
  padding: 0.6rem 0.9rem; margin: 0.4rem 0; border-radius: 0 8px 8px 0;
  font-size: 0.88rem;
}

.actions { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem; }
.actions .btn { padding: 0.9rem; font-size: 0.95rem; font-weight: 700; }

footer {
  margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border);
  text-align: center; font-size: 0.8rem; color: var(--text-dim);
}
footer a { color: var(--primary); text-decoration: none; }

.qmark { color: var(--text-dim); font-size: 0.78rem; }

.hint-btn {
  background: rgba(245,158,11,0.12);
  border: 1px solid var(--orange);
  color: var(--orange);
  padding: 0.45rem 0.85rem;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  margin: 0.4rem 0;
}
.hint-btn:hover { background: rgba(245,158,11,0.2); }
.hint-box {
  background: rgba(245,158,11,0.1);
  border-left: 3px solid var(--orange);
  padding: 0.6rem 0.9rem;
  border-radius: 0 8px 8px 0;
  font-size: 0.92rem;
  color: var(--text);
  margin: 0.3rem 0 0.7rem;
  line-height: 1.5;
}
.confetti { position: fixed; pointer-events: none; z-index: 50; }
</style>

<script>
// =========================================================
// Storage
// =========================================================
const STORAGE_KEY = 'neil_wed_review_v1';
const defaultState = {
  answers: {},          // ORIGINAL questionIdx -> chosen letter ("A"/"B"/"C"/"D")
  submitted: false,
  attempts: 0,
  bestScore: 0,
  lastScore: 0,
  startedAt: null,
  questionOrder: null,  // array of original indices; null = default order
};

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function getOrder() {
  if (Array.isArray(state.questionOrder) && state.questionOrder.length === QUESTIONS.length) {
    return state.questionOrder;
  }
  return QUESTIONS.map((_, i) => i);
}
let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return { ...defaultState, ...JSON.parse(raw) };
  } catch (e) {}
  return JSON.parse(JSON.stringify(defaultState));
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

// =========================================================
// All 40 questions from teacher's MC Review
// =========================================================
const QUESTIONS = [
  { topic:"Multiply binomials", q:"Simplify the expression: 3(2x + 1)(x − 2)",
    choices:["6x² − 9x − 6", "2x² + 3x − 2", "2x² + 3x + 2", "6x² − 9x + 6"], ans:"A",
    hint:"FOIL the binomials first, then distribute the 3 to every term.",
    sol:"FOIL inside first: (2x+1)(x−2) = 2x² − 4x + x − 2 = 2x² − 3x − 2. Multiply by 3: 6x² − 9x − 6."},
  { topic:"Square of binomial", q:"Choose the correct polynomial that represents (2x − y)².",
    choices:["2x² − y²", "4x² − 4xy + y²", "4x² − y²", "4x² − 2xy + y²"], ans:"B",
    hint:"Pattern: (a − b)² = a² − 2ab + b². So (2x − y)² has THREE terms, not two.",
    sol:"(a−b)² = a² − 2ab + b². So (2x−y)² = 4x² − 4xy + y²."},
  { topic:"Subtract polynomials", q:"Find the difference: (−2n + 4) − (n − 5)",
    choices:["−2n + 9", "−2n − 1", "−3n + 9", "−3n − 1"], ans:"C",
    hint:"Distribute the minus sign through (n − 5). Then combine like terms.",
    sol:"Distribute the minus: −2n + 4 − n + 5 = −3n + 9."},
  { topic:"Difference of squares", q:"Choose the correct completely factored polynomial: 25x² − 36",
    choices:["(5x − 6)²", "(5x + 6)²", "(5x + 6)(5x − 6)", "5(5x − 6)(5x + 6)"], ans:"C",
    hint:"Both 25x² and 36 are perfect squares. Which factoring pattern is that?",
    sol:"a² − b² = (a+b)(a−b). 25x² = (5x)², 36 = 6². Answer: (5x+6)(5x−6)."},
  { topic:"Factor trinomial", q:"Which shows the polynomial x² + 8x + 15, correctly factored?",
    choices:["(x + 15)(x + 1)", "(x + 15)(x − 1)", "(x + 5)(x + 3)", "(x − 5)(x − 3)"], ans:"C",
    hint:"Need two numbers: product 15, sum 8.",
    sol:"Need two numbers product 15, sum 8 → 3 and 5. So (x + 3)(x + 5)."},
  { topic:"Quadratic transformation", q:"The graph of g(x) is shown (downward parabola, vertex at (1, 4)). The graph can be obtained by shifts of f(x) = x². What is g(x)?",
    graph:"Downward parabola with vertex at (1, 4).",
    choices:["g(x) = (x + 1)² + 4", "g(x) = −(x + 1)² + 4", "g(x) = (x − 1)² + 4", "g(x) = −(x − 1)² + 4"], ans:"D",
    hint:"Vertex appears at (1, 4) → form is (x − 1)² + 4. But parabola opens DOWN — what does that mean for the sign?",
    sol:"Vertex (h, k) = (1, 4) → (x − 1)² + 4. Opens DOWN → negative coefficient: −(x − 1)² + 4."},
  { topic:"Equation from graph", q:"Which equation represents the graph shown (parabola with x-intercepts at −1 and 3)?",
    graph:"Parabola crossing x-axis at x = −1 and x = 3.",
    choices:["y = (x + 3)(x − 1)", "y = (x + 3)(x + 1)", "y = (x − 3)(x + 1)", "y = (x − 3)(x − 1)"], ans:"C",
    hint:"Zeros at −1 and 3 become factors: x − (−1) = (x + 1) and x − 3 = (x − 3).",
    sol:"Zeros at x = −1 and x = 3 → factors are (x + 1) and (x − 3). So y = (x − 3)(x + 1)."},
  { topic:"Solve by square roots", q:"Solve: (x − 2)² = 14",
    choices:["2 ± √14", "9, −5", "±√14", "9"], ans:"A",
    hint:"Square root both sides — and don't forget the ± when you take the root.",
    sol:"Square root both sides: x − 2 = ±√14 → x = 2 ± √14."},
  { topic:"Solve by square roots", q:"Solve: x² = 8",
    choices:["x = 4, −4", "x = 2√2, −2√2", "x = √8, −√8", "x = 2√2"], ans:"B",
    hint:"x² = 8 → x = ±√8. Now simplify √8 by pulling out a perfect square.",
    sol:"x = ±√8 = ±√(4·2) = ±2√2. (Note: √8 is also valid but B is simplified.)"},
  { topic:"Quadratic formula", q:"Solve: 2x² + 5x − 1 = 0",
    choices:["(5 ± √17)/4", "(−5 ± √17)/4", "(5 ± √33)/4", "(−5 ± √33)/4"], ans:"D",
    hint:"Quadratic formula. a = 2, b = 5, c = −1. Watch the sign of c carefully.",
    sol:"a=2, b=5, c=−1. D = 25 − 4(2)(−1) = 25 + 8 = 33. x = (−5 ± √33)/4."},
  { topic:"Discriminant", q:"How many real solutions does the quadratic equation 3x² − x + 2 = 0 contain?",
    choices:["one real solution", "two real solutions", "no real solutions", "three real solutions"], ans:"C",
    hint:"Compute the discriminant D = b² − 4ac. The SIGN of D tells you the answer.",
    sol:"D = (−1)² − 4(3)(2) = 1 − 24 = −23. Negative → 0 real solutions."},
  { topic:"Vertex from factored form", q:"Identify the vertex of the parabola: y = −(x − 2)(x − 4)",
    choices:["(3, −1)", "(−3, 1)", "(3, 1)", "(1, 3)"], ans:"C",
    hint:"Zeros are at 2 and 4 → vertex's x is halfway between them. Then plug back for y.",
    sol:"Zeros at x = 2 and x = 4 → axis is midway: x = 3. Plug in: y = −(3−2)(3−4) = −(1)(−1) = 1. Vertex (3, 1)."},
  { topic:"Axis & vertex from standard", q:"Find the axis of symmetry and the vertex: f(x) = x² + 3x − 3",
    choices:["axis x = −3/2 and vertex (−3/2, 21/4)", "axis x = 3/2 and vertex (3/2, 15/4)", "axis x = −3/2 and vertex (−3/2, −21/4)", "axis x = −3/2 and vertex (3/2, 15/4)"], ans:"C",
    hint:"Axis: x = −b/(2a). Then plug that x into f to get the y-coordinate of the vertex.",
    sol:"Axis: x = −b/(2a) = −3/2. f(−3/2) = 9/4 − 9/2 − 3 = 9/4 − 18/4 − 12/4 = −21/4."},
  { topic:"Zero-product", q:"Solve the equation: (s − 8)(s + 9) = 0",
    choices:["s = −8, s = 9", "s = −8/9", "s = −9/8", "s = 8, s = −9"], ans:"D",
    hint:"Zero-product property: if a · b = 0, then a = 0 OR b = 0.",
    sol:"Set each factor = 0: s − 8 = 0 → s = 8; s + 9 = 0 → s = −9."},
  { topic:"Compare graph shifts", q:"What is the difference between the graphs of y = x² + 4 and y = x² − 9?",
    choices:["The graph of y = x² + 4 is 13 units above the graph of y = x² − 9.",
             "The graph of y = x² + 4 is 4 units above the graph of y = x² − 9.",
             "The graph of y = x² − 9 is 9 units below the graph of y = x² + 4.",
             "The graph of y = x² − 9 is 5 units to the left of the graph of y = x² + 4."], ans:"A",
    hint:"Compare the constants: +4 vs −9. Difference = 4 − (−9). That's how far apart they are vertically.",
    sol:"Compare vertical shifts: +4 vs −9. Difference is 4 − (−9) = 13 units. The +4 graph is 13 units ABOVE the −9 graph."},
  { topic:"Projectile — initial height", q:"The function h = −16t² + 32t + 8 models the height of a football. What is the initial height?",
    choices:["0 ft (ground level)", "32 ft", "16 ft", "8 ft"], ans:"D",
    hint:"Initial = at time t = 0. Plug t = 0 into the function. Only the constant survives.",
    sol:"Initial height = h(0) = 0 + 0 + 8 = 8 ft. (It's just the constant term c.)"},
  { topic:"Exponential equation", q:"Which equation has a solution of x = 1?",
    choices:["2^(x+3) = 2⁴", "4^(x+2) = 4", "8^(2x+3) = 8⁴", "3^(2x−1) = 3³"], ans:"A",
    hint:"Same base on both sides → exponents must be equal. Try each option and see which gives x = 1.",
    sol:"Same base → exponents equal. A) x+3 = 4 → x = 1 ✓. B) x+2 = 1 → x = −1. C) 2x+3 = 4 → x = 1/2. D) 2x−1 = 3 → x = 2."},
  { topic:"Degree & type", q:"Find the degree and type of: 12x⁶ − 2z⁴ + 4x − 5y⁷",
    choices:["degree 6; polynomial", "degree 17; binomial", "degree 7; polynomial", "degree 7; trinomial"], ans:"C",
    hint:"Degree = the HIGHEST exponent anywhere in the expression. Count the terms to name the type.",
    sol:"Degree = highest exponent on any term = 7 (from −5y⁷). Has 4 terms → polynomial."},
  { topic:"Multiply binomials", q:"What is the area of a rectangle with length (x − 3) and width (x + 3)?",
    choices:["x² − 9x", "x² − 9", "x² − 6x + 9", "x² + 6x − 9"], ans:"B",
    hint:"Length × width = (x − 3)(x + 3). Recognize a factoring pattern? (Hint: difference of squares in reverse.)",
    sol:"(x − 3)(x + 3) is a difference of squares: x² − 9."},
  { topic:"Exponent rules", q:"Simplify: 9pq⁻¹ · p⁵",
    choices:["9p⁵/q", "p⁶/(9q)", "9p⁶/q", "9p⁶y"], ans:"C",
    hint:"p · p⁵ = p^(1+5). And q⁻¹ = 1/q.",
    sol:"p · p⁵ = p⁶. q⁻¹ = 1/q. So 9p⁶/q."},
  { topic:"Exponential growth", q:"In 2005, 150,000 people attended the Arizona State Fair. Attendance increases by 6% per year. Which function represents the attendance t years after 2005?",
    choices:["y = 150,000(1.06)^t", "y = 150,000(0.6)^t", "y = 150,000(0.94)^t", "y = 150,000(1.6)^t"], ans:"A",
    hint:"Growth: y = a(1 + r)^t. r is the decimal rate. So multiplier is 1.0_.",
    sol:"Growth: y = a(1 + r)^t. r = 0.06 → multiplier 1.06."},
  { topic:"Exponent rules", q:"Which expression is NOT equivalent to the others?",
    choices:["1/y⁻³", "y¹⁰/y⁷", "y² · y", "(y⁵)²"], ans:"D",
    hint:"Simplify each option as a single power of y. Three should match, one is different.",
    sol:"A) 1/y⁻³ = y³. B) y¹⁰⁻⁷ = y³. C) y³. D) y¹⁰. The odd one out is D."},
  { topic:"Exponential decay", q:"Which equation represents a population of 5,500 people decreasing at an annual rate of 5%?",
    choices:["y = 5500(0.05)^x", "y = 5500(1.5)^x", "y = 5500(0.95)^x", "y = 5500(1.05)^x"], ans:"C",
    hint:"Decay: y = a(1 − r)^t. r = 0.05, so multiplier is 0.95.",
    sol:"Decay: y = a(1 − r)^x. r = 0.05 → multiplier 0.95."},
  { topic:"Exponential evaluation", q:"f(x) = 50(1.2)^x gives bacteria count after x days. To the nearest whole number, how many bacteria after 8 days?",
    choices:["215", "2", "480", "58"], ans:"A",
    hint:"Plug x = 8 into 50 × (1.2)^x. Use a calculator for 1.2^8.",
    sol:"f(8) = 50(1.2)^8 ≈ 50 × 4.2998 ≈ 214.99 → 215."},
  { topic:"Compound interest", q:"Sam deposited $1200 at 4% interest compounded annually for 20 years. How much is in her account now? [A = P(1 + r/n)^(nt)]",
    choices:["$900.00", "$2,629.35", "$24,960.00", "$1,004,019.07"], ans:"B",
    hint:"Use A = P(1 + r)^t with P = 1200, r = 0.04, t = 20.",
    sol:"A = 1200(1.04)^20 ≈ 1200 × 2.1911 ≈ $2,629.35."},
  { topic:"Identify exponential", q:"Which table represents an exponential function?",
    extra:"A) X: 1,2,3,4 → Y: 3, 9, 27, 81\nB) X: 1,2,3,4 → Y: 1, 2, 3, 4\nC) X: 1,2,3,4 → Y: 0, 2, 4, 6\nD) X: 1,2,3,4 → Y: 4, 8, 12, 16",
    choices:["Table A", "Table B", "Table C", "Table D"], ans:"A",
    hint:"Exponential = constant RATIO between consecutive y-values (not constant difference). Divide y by previous y.",
    sol:"Exponential = constant RATIO between consecutive y's. A: 9/3=3, 27/9=3, 81/27=3 → ratio 3, exponential ✓. B/C/D have constant differences (arithmetic), not constant ratios."},
  { topic:"Radical to exponent", q:"Which is the equivalent expression in exponential form for the 4th root of 7 (⁴√7)?",
    choices:["7⁴", "7^(1/4)", "4⁷", "7^(1/2)"], ans:"B",
    hint:"n-th root = exponent 1/n. Fourth root → exponent 1/4.",
    sol:"n-th root → exponent 1/n. ⁴√7 = 7^(1/4)."},
  { topic:"Growth or decay?", q:"Does g(x) = −4(1/3)^x represent exponential growth, decay, or neither?",
    choices:["Exponential growth", "Exponential decay", "Neither"], ans:"B",
    hint:"Base < 1 → decay (regardless of the −4 in front).",
    sol:"Base = 1/3 < 1 → decay. (The negative coefficient just flips the graph; it's still decay.)"},
  { topic:"Power of a power", q:"Simplify: (−2a³b⁴)³(a⁵b²)²",
    choices:["−8a¹⁹b¹⁶", "8a¹⁹b¹⁶", "−8a¹³b¹¹", "8a⁹⁰b⁴⁸"], ans:"A",
    hint:"Apply the outer exponents first (distribute to every factor inside), then combine like bases.",
    sol:"(−2a³b⁴)³ = −8a⁹b¹². (a⁵b²)² = a¹⁰b⁴. Multiply: −8a^(9+10)b^(12+4) = −8a¹⁹b¹⁶."},
  { topic:"Negative exponent", q:"Simplify: 4⁻²",
    choices:["16", "−16", "1/8", "1/16"], ans:"D",
    hint:"Negative exponent flips: 4⁻² = 1/4². Now compute 4².",
    sol:"4⁻² = 1/4² = 1/16."},
  { topic:"Simplify radical with variable", q:"Simplify: √(36y²)",
    choices:["6y√y", "6y", "6y²", "36√y"], ans:"B",
    hint:"√36 = 6, and √(y²) = y. Multiply them.",
    sol:"√36 = 6, √(y²) = y. Answer: 6y."},
  { topic:"Simplify radical", q:"Simplify: √27",
    choices:["9√3", "6√3", "3√9", "3√3"], ans:"D",
    hint:"27 = 9 · 3. √9 comes out as 3, and 3 stays inside.",
    sol:"27 = 9 · 3. √27 = √9 · √3 = 3√3."},
  { topic:"Rationalize denominator", q:"Simplify by rationalizing the denominator: 7/√7",
    choices:["√7", "7√7/√7", "7", "7√7/49"], ans:"A",
    hint:"Multiply numerator AND denominator by √7. Then simplify the result.",
    sol:"7/√7 · √7/√7 = 7√7/7 = √7."},
  { topic:"Factor ax²+bx+c", q:"Factor completely: 3x² − 11x − 4",
    choices:["(x − 12)(x + 1)", "(3x + 1)(x − 4)", "(x + 12)(x − 1)", "(3x − 1)(x + 4)"], ans:"B",
    hint:"AC = 3 × (−4) = −12. Find two numbers: product −12, sum −11. Split and group.",
    sol:"AC = 3·(−4) = −12. Need product −12, sum −11 → −12 and 1. Split: 3x² − 12x + x − 4. Group: 3x(x − 4) + 1(x − 4) = (3x + 1)(x − 4)."},
  { topic:"Factor by grouping", q:"Factor completely: 3x³ + 9x² − x − 3",
    choices:["(3x²)(x + 3)", "(3x² + 1)(x + 3)", "(3x² − 1)(x + 3)", "3x(x + 3)"], ans:"C",
    hint:"Group: (3x³ + 9x²) + (−x − 3). Factor each pair, then look for a common binomial.",
    sol:"Group: (3x³ + 9x²) + (−x − 3) = 3x²(x + 3) − 1(x + 3) = (3x² − 1)(x + 3)."},
  { topic:"Solve quadratic", q:"Solve the equation: x² + 4x − 12 = 0",
    choices:["x = 6, x = −2", "x = −6", "x = −6, x = 2", "x = 2"], ans:"C",
    hint:"Factor: need two numbers with product −12, sum 4. Then zero-product.",
    sol:"Factor: (x + 6)(x − 2) = 0 → x = −6 or x = 2."},
  { topic:"Axis from vertex form", q:"Find the axis of symmetry: y = −4(x − 8)² + 2",
    choices:["x = −4", "x = 8", "x = 2", "x = −8"], ans:"B",
    hint:"Vertex form y = a(x − h)² + k → axis of symmetry is x = h.",
    sol:"Vertex form y = a(x − h)² + k → axis is x = h = 8."},
  { topic:"Zeros from graph", q:"What are the zeros? [graph: parabola crossing x-axis at x = −1 and x = 3]",
    graph:"Upward parabola with x-intercepts at x = −1 and x = 3, vertex below x-axis around y = −4.",
    choices:["x = −4", "x = −1 and x = 3", "x = 1", "x = 3"], ans:"B",
    hint:"Zeros = where the parabola crosses the x-axis. Read them off the graph.",
    sol:"Zeros are where the parabola crosses the x-axis: x = −1 and x = 3."},
  { topic:"Domain from graph", q:"What is the domain? [same parabola]",
    graph:"Same upward parabola from question 38.",
    choices:["−∞ < x < ∞", "−4 ≤ x < ∞", "−1 ≤ x ≤ 3", "∞ < x < −∞"], ans:"A",
    hint:"Parabolas extend left and right FOREVER. Domain = all real numbers.",
    sol:"Parabolas extend infinitely left and right → domain is all real numbers, −∞ < x < ∞."},
  { topic:"Range from graph", q:"What is the range? [same parabola, vertex at y = −4]",
    graph:"Same upward parabola, vertex at y = −4.",
    choices:["−∞ < y < ∞", "−4 ≤ y < ∞", "−1 ≤ y ≤ 3", "∞ < y ≤ −4"], ans:"B",
    hint:"Range: lowest point (vertex y-value) up to infinity, since parabola opens up.",
    sol:"Parabola opens up, minimum y is −4 (the vertex), goes up to infinity → −4 ≤ y < ∞."},
];

// =========================================================
// Render
// =========================================================
const root = document.getElementById('quiz');
const examDate = new Date(2026, 4, 21); // Wednesday May 21 — best guess

function refreshHeader() {
  const answered = Object.keys(state.answers).length;
  document.getElementById('scorePill').textContent = state.submitted
    ? `${calcScore()} / ${QUESTIONS.length}`
    : `${answered} / ${QUESTIONS.length} answered`;
  const days = Math.max(0, Math.ceil((examDate - new Date()) / 86400000));
  document.getElementById('cd').textContent = days === 0 ? 'TEST DAY!' : (days + ' days until Wed test');
}

function calcScore() {
  let s = 0;
  Object.keys(state.answers).forEach(i => {
    if (state.answers[i] === QUESTIONS[i].ans) s++;
  });
  return s;
}

function selectChoice(qIdx, letter) {
  if (state.submitted) return;
  state.answers[qIdx] = letter;
  saveState();
  renderQuestions();
}

function toggleHint(qIdx) {
  if (!state.hintsShown) state.hintsShown = {};
  if (!state.hintsCount) state.hintsCount = 0;
  if (state.hintsShown[qIdx]) {
    delete state.hintsShown[qIdx];
  } else {
    state.hintsShown[qIdx] = true;
    state.hintsCount = (state.hintsCount || 0) + 1;
  }
  saveState();
  renderQuestions();
  // scroll to the question
  setTimeout(() => {
    const cards = document.querySelectorAll('.q-card');
    if (cards[qIdx]) cards[qIdx].scrollIntoView({behavior:'smooth', block:'center'});
  }, 50);
}

function renderQuestions() {
  refreshHeader();
  const answered = Object.keys(state.answers).length;
  const pct = Math.round(answered / QUESTIONS.length * 100);

  let html = `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;

  const order = getOrder();
  order.forEach((origIdx, displayIdx) => {
    const q = QUESTIONS[origIdx];
    const selected = state.answers[origIdx];
    const showFeedback = state.submitted;
    const i = origIdx; // keep variable name for backwards compatibility inside block

    html += `<div class="q-card">
      <div class="q-meta">
        <span><strong>${displayIdx+1} / 40</strong></span>
        <span class="topic">${q.topic}</span>
      </div>
      <div class="q-text">${q.q}</div>`;

    if (q.graph) html += `<div class="q-graph-note">📊 ${q.graph}</div>`;
    if (q.extra) html += `<div class="q-extra">${q.extra.replace(/\n/g, '<br>')}</div>`;

    // Hint button (always available before submit)
    if (!showFeedback && q.hint) {
      const hintShown = (state.hintsShown || {})[origIdx];
      html += `<button class="hint-btn" onclick="toggleHint(${origIdx})">${hintShown ? '🙈 Hide hint' : '💡 Get a hint'}</button>`;
      if (hintShown) html += `<div class="hint-box">💡 ${q.hint}</div>`;
    }

    html += `<div class="choices">`;
    q.choices.forEach((c, j) => {
      const letter = "ABCD"[j];
      let cls = 'choice';
      if (showFeedback) {
        if (letter === q.ans) cls += ' correct';
        else if (selected === letter) cls += ' wrong';
      } else if (selected === letter) {
        cls += ' selected';
      }
      html += `<button class="${cls}" onclick="selectChoice(${origIdx}, '${letter}')"${showFeedback ? ' disabled' : ''}>
        <span class="letter">${letter}</span><span>${c}</span>
      </button>`;
    });
    html += `</div>`;

    if (showFeedback) {
      if (selected === q.ans) {
        html += `<div class="feedback right"><strong>✓ Correct</strong>${q.sol}</div>`;
      } else if (selected) {
        html += `<div class="feedback wrong"><strong>✗ Answer: ${q.ans}</strong>${q.sol}</div>`;
      } else {
        html += `<div class="feedback wrong"><strong>Skipped — Answer: ${q.ans}</strong>${q.sol}</div>`;
      }
    }
    html += `</div>`;
  });

  // Submit / Retake
  if (!state.submitted) {
    html += `<div class="nav-row">
      <button class="btn btn-secondary" onclick="resetQuiz()">Reset answers</button>
      <button class="btn btn-primary" onclick="submitQuiz()">Submit & see results</button>
    </div>
    <p class="qmark" style="text-align:center;margin-top:0.5rem;">${answered} of ${QUESTIONS.length} answered. ${answered < QUESTIONS.length ? 'Skipped questions count as wrong.' : 'All done — submit!'}</p>`;
  } else {
    const score = calcScore();
    html = renderResults(score) + html + `<div class="actions">
      <button class="btn btn-primary" onclick="retakeQuiz()">🔁 Retake (clear answers)</button>
      <button class="btn btn-secondary" onclick="reviewMode()">🔍 Keep answers, review wrong ones</button>
    </div>`;
  }
  root.innerHTML = html;
}

function renderResults(score) {
  const pct = Math.round(score / QUESTIONS.length * 100);
  const passed = pct >= 80;
  state.lastScore = pct;
  if (pct > state.bestScore) state.bestScore = pct;
  saveState();

  const wrongs = [];
  QUESTIONS.forEach((q, i) => {
    if (state.answers[i] !== q.ans) wrongs.push({i, q, your: state.answers[i]});
  });

  let html = `<div class="results ${passed ? 'pass' : 'fail'}">`;
  if (passed) {
    html += `<h2>🎉 EXIT TICKET CLEAR!</h2>
      <div class="big-score pass">${pct}%</div>
      <div class="verdict">${score} / 40 — that's the 80% threshold. Skip COA.</div>
      <div class="summary">Take it again on Wednesday in class with the same focus — and don't trust this score blindly. Verify by retaking once more on Tuesday.</div>`;
    setTimeout(confetti, 200);
  } else {
    html += `<h2>📚 Almost — keep grinding</h2>
      <div class="big-score fail">${pct}%</div>
      <div class="verdict">${score} / 40 — need 32 (80%). You're ${32 - score} short.</div>
      <div class="summary">Look at the wrong answers below. Notice patterns — which topic is showing up the most? Focus tomorrow's session there.</div>`;
  }
  html += `<div style="margin-top:0.8rem;font-size:0.85rem;color:var(--text-dim);">Best so far: ${state.bestScore}% · Attempt #${state.attempts}</div>`;
  html += `</div>`;

  if (wrongs.length > 0) {
    html += `<div class="miss-list"><h3>Topics to focus on (${wrongs.length} missed)</h3>`;
    const topicCount = {};
    wrongs.forEach(({q}) => { topicCount[q.topic] = (topicCount[q.topic] || 0) + 1; });
    Object.keys(topicCount).sort((a,b) => topicCount[b] - topicCount[a]).forEach(t => {
      html += `<div class="miss-item"><b>${topicCount[t]}× missed:</b> ${t}</div>`;
    });
    html += `</div>`;
  }
  return html;
}

function submitQuiz() {
  state.submitted = true;
  state.attempts += 1;
  saveState();
  renderQuestions();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function retakeQuiz() {
  if (!confirm("Clear all answers and start over?")) return;
  state.answers = {};
  state.submitted = false;
  state.hintsShown = {};
  state.hintsCount = 0;
  // Shuffle questions for retake (only after the first attempt)
  if ((state.attempts || 0) >= 1) {
    state.questionOrder = shuffleArray(QUESTIONS.map((_, i) => i));
    toast("🔀 Questions reshuffled — same 40, new order");
  }
  saveState();
  renderQuestions();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;top:1rem;left:50%;transform:translateX(-50%);background:var(--orange);color:white;padding:0.6rem 1rem;border-radius:999px;font-weight:700;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,0.25);font-size:0.88rem;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2400);
}
function resetQuiz() {
  if (!confirm("Clear all answers (no submit)?")) return;
  state.answers = {};
  saveState();
  renderQuestions();
}
function reviewMode() {
  // Keep submitted=true so feedback shows. Just scroll to first wrong.
  for (let i = 0; i < QUESTIONS.length; i++) {
    if (state.answers[i] !== QUESTIONS[i].ans) {
      const cards = document.querySelectorAll('.q-card');
      if (cards[i]) cards[i].scrollIntoView({ behavior: 'smooth', block: 'start' });
      break;
    }
  }
}

function confetti() {
  const colors = ['#FBBF24', '#EC4899', '#6366F1', '#10B981', '#F59E0B'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.cssText = 'width:10px;height:10px;background:' + colors[Math.floor(Math.random()*colors.length)] +
      ';left:' + (Math.random()*100) + '%;top:-20px;transform:rotate(' + (Math.random()*360) + 'deg);';
    document.body.appendChild(el);
    const dx = (Math.random() - 0.5) * 400;
    const dy = window.innerHeight + 100;
    el.animate([
      { transform: el.style.transform + ' translate(0,0)', opacity: 1 },
      { transform: el.style.transform + ` translate(${dx}px, ${dy}px) rotate(720deg)`, opacity: 0 }
    ], { duration: 1800 + Math.random()*1000, easing: 'cubic-bezier(.5,.5,.5,.99)' });
    setTimeout(() => el.remove(), 3000);
  }
}

renderQuestions();
</script>
</body>
</html>
