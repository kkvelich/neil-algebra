<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neil's Progress · Math Quest Tracker</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0F172A;
  --bg-card: #1E293B;
  --bg-elevated: #334155;
  --text: #F1F5F9;
  --text-dim: #94A3B8;
  --primary: #6366F1;
  --green: #10B981;
  --yellow: #FBBF24;
  --red: #EF4444;
  --orange: #F59E0B;
  --pink: #EC4899;
  --border: #334155;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: #F8FAFC;
    --bg-card: #FFFFFF;
    --bg-elevated: #F1F5F9;
    --text: #1A1A1A;
    --text-dim: #64748B;
    --border: #E2E8F0;
  }
}
html, body {
  margin: 0; padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.5;
}
.container { max-width: 880px; margin: 0 auto; padding: 1rem 1rem 4rem; }

.hero {
  background: linear-gradient(135deg, #6366F1, #EC4899);
  border-radius: 18px;
  padding: 1.25rem;
  color: white;
  margin: 0.5rem 0 1.5rem;
  text-align: center;
}
.hero h1 { margin: 0 0 0.3rem; font-size: 1.5rem; font-weight: 800; }
.hero p { margin: 0; opacity: 0.92; font-size: 0.92rem; }
.countdown {
  display: inline-block;
  background: rgba(255,255,255,0.2);
  padding: 0.4rem 0.9rem;
  border-radius: 999px;
  margin-top: 0.6rem;
  font-weight: 700;
  font-size: 0.88rem;
}

h2 {
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-dim);
  margin: 1.75rem 0 0.7rem 0.2rem;
}

.empty {
  background: var(--bg-card);
  border: 2px dashed var(--border);
  border-radius: 14px;
  padding: 2rem 1.5rem;
  text-align: center;
}
.empty h3 { margin: 0 0 0.6rem; font-size: 1.05rem; }
.empty p { margin: 0 0 1rem; color: var(--text-dim); font-size: 0.95rem; }
.empty .btn {
  display: inline-block;
  background: linear-gradient(135deg, var(--primary), var(--pink));
  color: white;
  text-decoration: none;
  padding: 0.7rem 1.2rem;
  border-radius: 10px;
  font-weight: 700;
  font-size: 0.9rem;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.5rem;
}
@media (min-width: 640px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 0.95rem 0.8rem;
  text-align: center;
}
.stat-num {
  font-size: 1.75rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary), var(--pink));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.stat-label {
  font-size: 0.74rem;
  color: var(--text-dim);
  font-weight: 600;
  margin-top: 0.15rem;
}
.stat-card .sub {
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-top: 0.1rem;
  font-weight: 500;
}
.stat-card.hot .stat-num {
  background: linear-gradient(135deg, #F59E0B, #EF4444);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* XP progress */
.xp-bar-wrap {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 0.9rem 1.1rem;
}
.xp-bar-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.88rem;
  font-weight: 700;
  margin-bottom: 0.4rem;
}
.xp-bar-head .lvl { color: var(--primary); }
.xp-bar-head .xp { color: var(--text-dim); font-weight: 500; }
.xp-bar {
  background: var(--bg-elevated);
  height: 10px;
  border-radius: 999px;
  overflow: hidden;
}
.xp-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--pink));
  border-radius: 999px;
  transition: width 0.3s ease;
}

/* Chapter mastery */
.ch-row {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 0.85rem 1rem;
  margin-bottom: 0.45rem;
  display: flex;
  align-items: center;
  gap: 0.7rem;
}
.ch-emoji { font-size: 1.5rem; }
.ch-info { flex: 1; min-width: 0; }
.ch-name { font-weight: 700; font-size: 0.96rem; }
.ch-sub { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.15rem; }
.ch-bar {
  background: var(--bg-elevated);
  height: 6px;
  border-radius: 6px;
  margin-top: 0.4rem;
  overflow: hidden;
}
.ch-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--yellow));
}
.ch-pct {
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--text-dim);
  min-width: 50px;
  text-align: right;
}
.ch-pct.mastered { color: var(--green); }
.ch-pct.strong { color: var(--primary); }
.ch-pct.weak { color: var(--red); }

/* Activity calendar */
.calendar {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1rem;
}
.cal-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.8rem;
}
.cal-month { font-weight: 700; font-size: 0.95rem; }
.cal-legend {
  display: flex;
  gap: 0.6rem;
  font-size: 0.7rem;
  color: var(--text-dim);
}
.cal-legend-dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 3px;
  vertical-align: middle;
  margin-right: 3px;
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-day-label {
  font-size: 0.65rem;
  color: var(--text-dim);
  text-align: center;
  font-weight: 600;
  padding-bottom: 0.3rem;
}
.cal-cell {
  aspect-ratio: 1 / 1;
  border-radius: 5px;
  background: var(--bg-elevated);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  color: var(--text-dim);
  font-weight: 600;
}
.cal-cell.active {
  background: var(--green);
  color: white;
  font-weight: 700;
}
.cal-cell.empty { background: transparent; }
.cal-cell.today { box-shadow: 0 0 0 2px var(--primary); }
.cal-cell.exam {
  background: linear-gradient(135deg, #EC4899, #BE185D);
  color: white;
}

/* Badges */
.badges-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.45rem;
}
@media (min-width: 540px) { .badges-grid { grid-template-columns: repeat(6, 1fr); } }
.badge {
  background: var(--bg-card);
  border-radius: 12px;
  padding: 0.6rem 0.3rem;
  text-align: center;
  border: 1px solid var(--border);
  opacity: 0.3;
}
.badge.earned {
  opacity: 1;
  border-color: var(--yellow);
  box-shadow: 0 0 12px rgba(251,191,36,0.18);
}
.badge .emoji { font-size: 1.65rem; line-height: 1; }
.badge .name { font-size: 0.65rem; font-weight: 700; margin-top: 0.3rem; line-height: 1.2; }

/* Recent activity */
.recent {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 0.95rem;
}
.recent-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.45rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.88rem;
}
.recent-row:last-child { border-bottom: none; }
.recent-row .left {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex: 1;
}
.recent-row .indicator {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.recent-row .indicator.correct { background: var(--green); }
.recent-row .indicator.wrong { background: var(--red); }
.recent-row .ts {
  font-size: 0.75rem;
  color: var(--text-dim);
}

.refresh-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.4rem 0.85rem;
  border-radius: 8px;
  font-family: inherit;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
}

.actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 0 0 0.5rem;
}

footer {
  margin-top: 2.5rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-dim);
}
footer a { color: var(--primary); text-decoration: none; }
</style>
</head>
<body>
<div class="container">

  <div class="hero">
    <h1>📊 Neil's Progress</h1>
    <p>Live data from the Math Quest app</p>
    <div class="countdown" id="cd"></div>
  </div>

  <div class="actions">
    <a href="math-quest.html" style="color: var(--primary); text-decoration:none; font-weight:700; font-size:0.9rem;">→ Open Math Quest</a>
    <button class="refresh-btn" onclick="render()">🔄 Refresh</button>
  </div>

  <div id="content"></div>

  <footer>
    <p><a href="index.html">← Back to Algebra 1 Hub</a></p>
    <p style="margin-top:0.5rem;font-size:0.72rem;opacity:0.7;">
      Data syncs from this device's browser. If Neil practices on a different device, that progress shows on that device only.
    </p>
  </footer>

</div>

<script>
// =========================================================
// Constants
// =========================================================
const EXAM_DATE = new Date(2026, 5, 11); // June 11, 2026
const MATH_QUEST_KEY = 'neil_math_quest_v1';

const CHAPTERS = {
  6:  { title: "Exponents & Exponential Fns",  emoji: "⚡" },
  7:  { title: "Polynomials & Factoring",       emoji: "🧩" },
  8:  { title: "Quadratics — Graphing",         emoji: "📈" },
  9:  { title: "Quadratics — Solving",          emoji: "🎯" },
  10: { title: "Rational Expressions",          emoji: "➗" },
  11: { title: "Radicals (√ & ∛)",              emoji: "√" },
};

const BADGES = [
  { id: "first-solve",    name: "First Solve",      emoji: "🌱" },
  { id: "streak-3",       name: "On Fire",           emoji: "🔥" },
  { id: "streak-7",       name: "Week Warrior",      emoji: "⚔️" },
  { id: "streak-14",      name: "Unstoppable",       emoji: "💪" },
  { id: "streak-30",      name: "Math Monk",         emoji: "🧘" },
  { id: "combo-5",        name: "Combo x5",          emoji: "✨" },
  { id: "combo-10",       name: "Combo x10",         emoji: "💫" },
  { id: "combo-20",       name: "Combo x20",         emoji: "🌟" },
  { id: "level-5",        name: "Apprentice",        emoji: "🎓" },
  { id: "level-10",       name: "Scholar",           emoji: "📚" },
  { id: "level-20",       name: "Master",            emoji: "👑" },
  { id: "master-ch6",     name: "Exponent Expert",   emoji: "⚡" },
  { id: "master-ch7",     name: "Factor Wizard",     emoji: "🧩" },
  { id: "master-ch8",     name: "Quadratic King",    emoji: "📈" },
  { id: "master-ch9",     name: "Solver Sensei",     emoji: "🎯" },
  { id: "master-ch10",    name: "Rational Ruler",    emoji: "➗" },
  { id: "master-ch11",    name: "Radical Royalty",   emoji: "√" },
  { id: "mock-pass",      name: "Exam Ready",        emoji: "🎯" },
  { id: "mock-perfect",   name: "Perfect Score",     emoji: "💎" },
  { id: "total-50",       name: "Half Century",      emoji: "🏅" },
  { id: "total-100",      name: "Centurion",         emoji: "🏆" },
  { id: "total-250",      name: "Math Marathoner",   emoji: "🚀" },
  { id: "speed-demon",    name: "Speed Demon",       emoji: "⚡" },
  { id: "comeback-kid",   name: "Comeback Kid",      emoji: "🦅" },
];

// =========================================================
// Load Math Quest state
// =========================================================
function loadMQ() {
  try {
    const raw = localStorage.getItem(MATH_QUEST_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) {
    return null;
  }
}

function xpForLevel(lvl) { return lvl * 100; }
function dateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const da = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + da;
}

// =========================================================
// Render
// =========================================================
function render() {
  // Countdown
  const days = Math.max(0, Math.ceil((EXAM_DATE - new Date()) / 86400000));
  document.getElementById('cd').textContent = days === 0 ? 'EXAM DAY!' : days + ' days until June 11 exam';

  const s = loadMQ();
  const content = document.getElementById('content');

  if (!s || s.totalSolved === 0) {
    content.innerHTML = `
      <div class="empty">
        <h3>🦉 No app activity yet on this device</h3>
        <p>When Neil opens Math Quest and solves problems, his progress shows up here automatically.<br><br>If he's been practicing on a different device or browser, the data lives there — this dashboard reads what's stored in <b>this</b> browser.</p>
        <a class="btn" href="math-quest.html">Open Math Quest →</a>
      </div>
    `;
    return;
  }

  // Stats
  const accuracy = s.totalSolved > 0 ? Math.round(s.totalCorrect / s.totalSolved * 100) : 0;
  const xpNext = xpForLevel(s.level);
  const xpPct = Math.min(100, Math.round(s.xp / xpNext * 100));
  const streakHotClass = s.streak >= 3 ? 'hot' : '';
  const earnedBadges = (s.badges || []).length;

  let html = `
    <div class="stats-grid">
      <div class="stat-card ${streakHotClass}">
        <div class="stat-num">${s.streak || 0}</div>
        <div class="stat-label">Current Streak</div>
        <div class="sub">Best: ${s.bestStreak || 0}</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${s.totalSolved || 0}</div>
        <div class="stat-label">Problems Solved</div>
        <div class="sub">${accuracy}% accuracy</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${s.level || 1}</div>
        <div class="stat-label">Level</div>
        <div class="sub">${s.xp || 0} / ${xpNext} XP</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${s.bestCombo || 0}</div>
        <div class="stat-label">Best Combo</div>
        <div class="sub">${earnedBadges} badges</div>
      </div>
    </div>

    <h2>Level Progress</h2>
    <div class="xp-bar-wrap">
      <div class="xp-bar-head">
        <span class="lvl">Level ${s.level} → ${s.level + 1}</span>
        <span class="xp">${s.xp} / ${xpNext} XP (${xpPct}%)</span>
      </div>
      <div class="xp-bar"><div class="xp-bar-fill" style="width:${xpPct}%"></div></div>
    </div>

    <h2>Chapter Mastery</h2>
  `;

  // Chapter mastery
  Object.keys(CHAPTERS).forEach(ch => {
    const info = CHAPTERS[ch];
    const m = Math.round((s.chapterMastery || {})[ch] || 0);
    let pctClass = 'weak';
    let label = 'Untested';
    if (m >= 80)      { pctClass = 'mastered'; label = 'Mastered'; }
    else if (m >= 60) { pctClass = 'strong';   label = 'Strong'; }
    else if (m >= 40) { pctClass = '';         label = 'Okay'; }
    else if (m > 0)   { pctClass = 'weak';     label = 'Weak'; }
    else              { pctClass = '';         label = 'Untested'; }
    html += `
      <div class="ch-row">
        <span class="ch-emoji">${info.emoji}</span>
        <div class="ch-info">
          <div class="ch-name">Ch ${ch}: ${info.title}</div>
          <div class="ch-sub">${label}</div>
          <div class="ch-bar"><div class="ch-bar-fill" style="width:${m}%"></div></div>
        </div>
        <div class="ch-pct ${pctClass}">${m}%</div>
      </div>
    `;
  });

  // Calendar — last 30 days
  html += `<h2>Activity (last 30 days)</h2>`;
  const today = new Date(); today.setHours(0,0,0,0);
  // Build a set of dates Neil played
  const playedDates = new Set();
  (s.attempts || []).forEach(a => {
    if (a.ts) {
      const d = new Date(a.ts);
      d.setHours(0,0,0,0);
      playedDates.add(dateStr(d));
    }
  });
  if (s.lastPlayedDate) playedDates.add(s.lastPlayedDate);

  // Build last 30 days starting from a Monday so columns align
  const cells = [];
  const cursor = new Date(today);
  cursor.setDate(cursor.getDate() - 27); // ~4 weeks
  // Roll back to Sunday
  while (cursor.getDay() !== 0) cursor.setDate(cursor.getDate() - 1);
  const examStr = dateStr(EXAM_DATE);
  for (let i = 0; i < 35; i++) {
    const cellDate = new Date(cursor);
    cellDate.setDate(cellDate.getDate() + i);
    const ds = dateStr(cellDate);
    const isToday = ds === dateStr(today);
    const isFuture = cellDate > today;
    const isPlayed = playedDates.has(ds);
    const isExam = ds === examStr;
    let cls = 'cal-cell';
    if (isPlayed) cls += ' active';
    if (isToday) cls += ' today';
    if (isExam) cls += ' exam';
    if (isFuture && !isExam) cls += ' empty';
    cells.push({ date: cellDate, cls, isExam, isPlayed });
  }
  html += `
    <div class="calendar">
      <div class="cal-head">
        <div class="cal-month">${cursor.toLocaleDateString('en-US',{month:'short'})} — ${today.toLocaleDateString('en-US',{month:'short', day:'numeric'})}</div>
        <div class="cal-legend">
          <span><span class="cal-legend-dot" style="background:var(--green);"></span>Played</span>
          <span><span class="cal-legend-dot" style="background:linear-gradient(135deg,#EC4899,#BE185D);"></span>Exam</span>
        </div>
      </div>
      <div class="cal-grid">
        <div class="cal-day-label">S</div>
        <div class="cal-day-label">M</div>
        <div class="cal-day-label">T</div>
        <div class="cal-day-label">W</div>
        <div class="cal-day-label">T</div>
        <div class="cal-day-label">F</div>
        <div class="cal-day-label">S</div>
        ${cells.map(c => `<div class="${c.cls}" title="${c.date.toLocaleDateString()}">${c.isExam ? '🎯' : c.date.getDate()}</div>`).join('')}
      </div>
    </div>
  `;

  // Recent attempts (last 8)
  const recent = (s.attempts || []).slice(-8).reverse();
  if (recent.length > 0) {
    html += `<h2>Recent Problems</h2><div class="recent">`;
    recent.forEach(a => {
      const t = new Date(a.ts);
      const ago = timeAgo(t);
      const cls = a.correct ? 'correct' : 'wrong';
      const icon = a.correct ? '✓' : '✗';
      html += `
        <div class="recent-row">
          <div class="left">
            <span class="indicator ${cls}"></span>
            <span>${a.id || 'Problem'}</span>
          </div>
          <span class="ts">${icon} ${ago}</span>
        </div>
      `;
    });
    html += `</div>`;
  }

  // Badges
  const earned = new Set(s.badges || []);
  html += `<h2>Badges (${earned.size} / ${BADGES.length})</h2><div class="badges-grid">`;
  BADGES.forEach(b => {
    const isEarned = earned.has(b.id);
    html += `
      <div class="badge ${isEarned ? 'earned' : ''}">
        <div class="emoji">${b.emoji}</div>
        <div class="name">${b.name}</div>
      </div>
    `;
  });
  html += `</div>`;

  content.innerHTML = html;
}

function timeAgo(d) {
  const diff = Math.round((Date.now() - d.getTime()) / 1000);
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.round(diff/60)}m ago`;
  if (diff < 86400) return `${Math.round(diff/3600)}h ago`;
  return `${Math.round(diff/86400)}d ago`;
}

// Auto-refresh when tab gets focus (so if Neil practices then comes back here, it's fresh)
window.addEventListener('focus', render);
document.addEventListener('visibilitychange', () => { if (!document.hidden) render(); });

render();
</script>
</body>
</html>
